  - asset: 431
    site_id: chatham-101
    site_code: CHAT-101
    device_key: 431-fw-peplink-chat-101
    networks:
      lan_subnets:
        - 192.168.103.0/24
      lan_gateway: 192.168.103.1
    criticality: On-air
    tunnel_ref:
      tunnel_name: STL-CHAT-100
      tunnel_name_on_hub: STL-CHAT-100 IPsec
      tunnel_name_target: STL-CHAT-101 IPsec
    peer_expected_on_spoke:
      current: unknown
      target_bell: 207.236.163.98
      strategy: tbd_after_site_review
    notes:
      - "Peer device inventory currently points to Peplink (asset 431)."

cutover:
  objective: Ensure all active STL spokes accept hub bell_target IP before WAN cutover
  pre_whitelist_required: true
  dual_whitelist_recommended: true
  execution_strategy:
    - "Prefer FQDN peer where supported: vpn.ucbradio.com (DNS-only, TTL 300)."
    - "Where FQDN not feasible, stage Bell peer by duplicate tunnel before cutover."
  notes:
    - Only active STL tunnels included (per hub enabled list).
    - Confirm whether Chatham peer is Peplink-only IPsec or IPsec passes through to a downstream firewall.
    