  - id: bell-102
    site_code: BELL-102
    name: National Media Centre (Belleville)
    role: hub
    city: Belleville
    province: Ontario
    ipsec:
      enabled: false
    networks:
      lan_subnets:
        - "192.168.100.0/24"
    notes: >
      NMC (National Media Centre) physical location.
      Primary head office site. Most broadcast/ops systems terminate here.
      SonicWall hub firewall asset 1 (TZ470).

