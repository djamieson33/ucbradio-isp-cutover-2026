# inventory/ipsec-tunnels.yaml
# Purpose: Source-of-truth inventory of IPsec tunnels for the ISP cutover.
# Style: Keep one object per tunnel. Add evidence_refs (UTC timestamps) as you validate.
#
# Notes:
# - Belleville (NMC-TZ470) Bell WAN (X3): 207.236.163.98 (static)
# - Belleville (NMC-TZ470) Cogeco WAN public IP observed as VPN peer on BROC-100: 24.51.249.34
#
# Conventions:
# - local_networks = Belleville-side protected networks (usually 192.168.100.0/24)
# - remote_networks = Site-side protected networks (e.g., 192.168.10x.0/24)
# - remote_peer = Site WAN IP (the peer Belleville connects to)
# - peer_expected_on_site = What the SITE currently expects Belleville to be (often Cogeco IP).
#   This is the key field for whitelisting Bell (207.236.163.98) ahead of cutover.

ipsec_tunnels:
  # ----------------------------
  # STL Site-to-Site (Tier-0)
  # ----------------------------

  - name: "STL-BROC-100"
    site: "Brockville"
    site_code: "BROC-100"
    remote_peer: "69.31.226.50"
    local_networks:
      - "192.168.100.0/24"
    remote_networks:
      - "192.168.104.0/24"
    crypto_suite: "ESP: AES-256/HMAC SHA256 (IKE)"
    ike_version: "IKE"
    auth_method: "PSK"          # not explicitly verified in screenshots; verify in policy details
    nat_traversal: "enabled"
    dpd:
      enabled: true
      interval_seconds: 60
      failure_trigger_level: 3
    peer_expected_on_site:
      current: "24.51.249.34"   # Belleville Cogeco public IP (confirmed on BROC-100)
      target_bell: "207.236.163.98"
      strategy: "duplicate_tunnel_on_site_preferred"
    purpose: "Studio LAN ↔ Brockville transmitter LAN"
    impact_if_down: "On-air"
    owner: "UCB (internal)"
    quick_tests:
      - name: "Ping Brockville firewall LAN"
        method: "ping"
        target: "192.168.104.1"
        expected: "Replies from 192.168.104.1 over VPN"
    evidence_refs:
      - "firewall/sonicwall/screenshots/broc-100-active-tunnel-20260225.png"
    last_verified_utc: ""

