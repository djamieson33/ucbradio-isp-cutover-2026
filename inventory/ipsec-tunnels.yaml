schema_version: 2
version: 7

refs:
  topology_file: inventory/ipsec-topology.yaml
  devices_root:
    firewalls: inventory/devices/firewalls/
    network: inventory/devices/network/

conventions:
  hub_device_key: 1-fw-sonicwall-bell-102
  peer_fqdn: vpn.ucbradio.com

ipsec_tunnels:

  - name: STL-BROC-100
    site: Brockville
    site_code: BROC-100
    site_id: brockville-tx

    hub:
      device_key: 1-fw-sonicwall-bell-102
      local_networks:
        - 192.168.100.0/24

    spoke:
      device_key: 9-fw-sonicwall-broc-100
      remote_peer: 69.31.226.50
      remote_networks:
        - 192.168.104.0/24

    peer_endpoint:
      fqdn: vpn.ucbradio.com
      hub_public_ips:
        cogeco_current: 24.51.249.34
        bell_target: 207.236.163.98

    crypto_suite: "ESP: AES-256/HMAC SHA256 (IKE)"
    ike_version: IKE
    auth_method: PSK
    nat_traversal: enabled

    dpd:
      enabled: true
      interval_seconds: 60
      failure_trigger_level: 3

    broadcast_dependency:
      carries_rtp_audio: true
      dependent_devices:
        - 28-codec-zipone-broc-100
        - 84-tx-nautel-vs300-broc-100

    impact_if_down: On-air
    owner: UCB (internal)

    quick_tests:
      - name: Ping Brockville firewall LAN
        method: ping
        target: 192.168.104.1
        expected: Replies from 192.168.104.1 over VPN

    evidence_refs:
      - firewall/sonicwall/screenshots/broc-100-active-tunnel-20260225.png

    last_verified_utc: ""

