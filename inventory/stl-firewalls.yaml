    site_code: "BELL-100"
    site: "Belleville (Read)"
    role: "spoke"
    vendor: "SonicWall"
    model: "TZ270"
    serial: "2CB8EDD82610"
    lan:
      networks: ["192.168.101.0/24"]
      mgmt_ip: "192.168.101.1"
    wan:
      public_ip: "69.31.226.114"
    tunnel:
      name_on_hub: "STL-BELL-100 IPsec"
      remote_networks_seen_on_hub: ["192.168.101.0/24"]
    peer_expected_on_spoke:
      hub_peer_current: "unknown"
