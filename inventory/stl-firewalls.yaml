# inventory/stl-firewalls.yaml
# Purpose: Source-of-truth list of STL (Belleville hub ↔ remote spoke) firewalls
#          involved in the IPsec cutover risk surface.
#
# Scope:
# - Includes ONLY firewalls that participate in the active STL site-to-site tunnels
#   on hub asset 1 (BELL-102).
# - Non-firewall devices (transmitters, ISP records, etc.) intentionally excluded.
#
# Key cutover fact:
# - Remote firewalls that currently whitelist/expect the hub peer as Cogeco
#   (24.51.249.34) must also accept the Bell static IP (207.236.163.98)
#   before the final cutover.
#
# IMPORTANT:
# - The imported master asset list DOES NOT currently contain a confirmed SonicWall entry for Chatham.
#   The CHAT-100 tunnel is active on the hub, so the CHAT firewall asset is tracked as unknown
#   until confirmed by a site login or updated asset inventory.

version: 2

hub:
  asset: 1
  site_code: "BELL-102"
  site: "Belleville (NMC)"
  role: "hub"
  vendor: "SonicWall"
  model: "TZ470"
  serial: "2CB8ED903580"
  lan:
    networks:
      - "192.168.100.0/24"
    mgmt_ip: "192.168.100.1"
  wan:
    interface: "X3"
    public_ip_bell: "207.236.163.98"
    public_ip_cogeco_observed: "24.51.249.34"
    gateway_bell: "207.236.163.97"
    subnet_mask_bell: "255.255.255.224"
  management:
    urls:
      - "https://sw.ucbradio.com"
      - "https://192.168.100.1"

spokes:
