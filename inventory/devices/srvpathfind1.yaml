schema_version: 1
id: srvpathfind1
name: SRVPATHFIND1 (Aquira)
type: server
site: nmc-belleville
role: traffic-system

network:
  mgmt_ip: 192.168.100.18  # TODO: confirm actual current IP at site
  mgmt_port: 3389
  notes: >
    If name resolution points to 192.168.100.10, investigate DNS/hosts/WINS when back onsite.

access:
  mgmt_url: rdp://192.168.100.18
  auth_ref: 1password://Shared/SERVER - SRVPATHFIND1 Admin

ownership:
  primary: dj
  escalation: dt

dependencies:
  upstream:
    - sonicwall-nmc

cutover:
  criticality: broadcast-critical
  prechecks:
    - Confirm Aquira outbound comms via Bell (vendor endpoints, licensing, automation links)
  rollback:
    - Revert WAN routing to Cogeco if Aquira comms fail
