# inventory/devices/firewalls/1-bell-102.yaml
# Belleville NMC hub firewall (BELL-102)
#
# Purpose:
# - Source-of-truth device profile for STL hub IPsec tunnels
# - ISP cutover (Cogeco -> Bell) validation and documentation
#
# Secrets policy:
# - Do not store passwords or PSKs in this repo.
# - Store in 1Password and reference via *_secret_ref fields.
#
# Evidence basis:
# - SonicWall "Remote Access" card (TZ470 / serial)
# - Interface list (X1 Cogeco, X3 Bell)
# - X3 interface settings (static IP/gateway/DNS, mgmt toggles)
# - IPsec policy settings (BELL-102 side for STL tunnels)

schema_version: 1

device:
  name: "BELL-102"
  site: "Belleville (National Media Centre)"
  site_id: "belleville-nmc"
  site_code: "BELL-102"
  asset_number: 1
  vendor: "SonicWall"
  model: "TZ470"
  role: "Hub firewall"
  # Keep BOTH as requested (even if identical in current evidence)
  unique_firewall_identifier: "2CB8ED903580"
  serial_number: "2CB8ED903580"
  firmware:
    sonic_os: "unknown"     # TODO: confirm (System > Settings/Status)
    build: "unknown"
  tags:
    - hub
    - belle-102
    - sonicwall
    - tz470
    - stl-core

management:
  wan_url: "https://sw.ucbradio.com"
  lan_url: "https://192.168.100.1"
  username: "admin"
  password_secret_ref: "1password://<vault>/<item>/BELL-102-admin"
  notes:
    - "Primary hub for all STL IPsec tunnels"
    - "X3 is Bell static: 207.236.163.98"
    - "Previous Cogeco peer observed as 24.51.249.34"
    - "Do not disable Cogeco (X1) during business hours; production still relies on it."

interfaces:
  # NOTE:
  # We model interfaces individually because SonicWall behavior (VPN listening, mgmt, routing)
  # depends on interface/zone configuration.

  X0:
    zone: "LAN"
    enabled: true
    ip_assignment: "static"
    ip_address: "192.168.100.1"
    subnet_mask: "255.255.255.0"
    subnet_cidr: "192.168.100.0/24"
    link: "unknown"
    management:
      https: "unknown"
      ssh: "unknown"
      ping: "unknown"
      snmp: "unknown"
    notes:
      - "Primary internal LAN gateway for NMC."

  X1:
    zone: "WAN"
    enabled: true
    ip_assignment: "static"
    ip_address: "24.51.249.34"            # Cogeco current public
    subnet_mask: "255.255.255.248"        # assumed /29; confirm in X1 settings
    subnet_cidr: "24.51.249.32/29"         # derived; confirm if required
    default_gateway: "unknown"             # TODO: confirm in X1 edit screen
    dns_servers: []                        # TODO: confirm in X1 edit screen
    link: "unknown"
    management:
      https: "unknown"
      ssh: "unknown"
      ping: "unknown"
      snmp: "unknown"
    notes:
      - "Cogeco WAN is currently production primary."
      - "This is the hub peer IP currently expected by several remote sites unless pre-whitelisted."

  X2:
    zone: "STAFF-ZONE"
    enabled: true
    ip_assignment: "static"
    ip_address: "10.2.254.1"
    subnet_mask: "255.255.255.0"
    subnet_cidr: "10.2.254.0/24"
    link: "unknown"
    notes:
      - "Official Staff Zone."

  X3:
    zone: "WAN"
    enabled: true
    ip_assignment: "static"
    ip_address: "207.236.163.98"          # Bell static (confirmed)
    subnet_mask: "255.255.255.224"
    subnet_cidr: "207.236.163.96/27"
    default_gateway: "207.236.163.97"
    dns_servers:
      - "67.69.184.199"
      - "67.69.184.7"
      - "8.8.8.8"
    link_speed: "Auto Negotiate"
    link: "1 Gbps Full Duplex"
    comment: "Bell WAN (BID 1G/500)"
    management:
      https: false
      ping: false
      snmp: false
      ssh: true
      user_login_http: false
      user_login_https: true
      redirect_http_to_https: true
    advanced:
      interface_mtu: 1500
      multicast_support: false
      flow_control: false
      asymmetric_route_support: false
      enable_flow_reporting: true
      fragment_non_vpn_outbound_packets_larger_than_mtu: true
      ignore_df_bit: false
      send_icmp_frag_needed: false
    notes:
      - "Bell WAN is configured and link-up."
      - "ICMP ping to 207.236.163.98 may fail externally because X3 ping is disabled."

  X8:
    zone: "AXIA INTERNET"
    enabled: true
    ip_assignment: "static"
    ip_address: "192.168.200.1"
    subnet_mask: "255.255.255.0"
    subnet_cidr: "192.168.200.0/24"
    link: "No link"
    notes:
      - "Axia Audio Internet Test (currently no link)."

  X9:
    zone: "STAFF-ZONE"
    enabled: false
    ip_assignment: "static"
    ip_address: "10.10.10.1"
    subnet_mask: "255.255.255.0"
    subnet_cidr: "10.10.10.0/24"
    link: "No link"
    notes:
      - "Dwayne sandbox (disabled)."

routing:
  # NOTE: We are not changing production routing right now.
  # Confirm actual settings in Network > Routing.
  default_route:
    active_wan: "X1"                 # TODO: confirm
    failover_wan: "X3"               # intended
    mode: "unknown"                  # TODO: confirm (Failover/LB/SD-WAN)
  notes:
    - "Do not disable X1 (Cogeco) for testing; production still depends on it."
    - "Bell (X3) validation must be done using non-disruptive methods (policy-based routing, diagnostic tools, or parallel VPN tests)."

vpn:
  ipsec_site_to_site:
    description: "Hub side of all active STL tunnels"
    local_subnet: "192.168.100.0/24"
    spokes_active:
      - "BELL-100"
      - "BROC-100"
      - "CHAT-100"   # Known label typo on hub; should become CHAT-101 once validated
      - "COBO-100"
      - "KING-100"
      - "WIND-100"

    # Active policies observed on hub
    policies:
      - name_on_hub: "STL-BELL-100 IPsec"
        peer_gateway: "69.31.226.114"
        remote_subnets: ["192.168.101.0/24"]
        enabled: true

      - name_on_hub: "STL-BROC-100 IPsec"
        peer_gateway: "69.31.226.50"
        remote_subnets: ["192.168.104.0/24"]
        enabled: true

      - name_on_hub: "STL-CHAT-100 IPsec"
        peer_gateway: "67.71.250.138"
        remote_subnets: ["192.168.103.0/24"]
        enabled: true
        notes:
          - "KNOWN LABEL ISSUE: Dan confirmed CHAT-101 is the active location; hub label may be a typo."
          - "Peer device is currently believed to be Peplink (asset 431); verify when access is available."

      - name_on_hub: "STL-COBO-100 IPsec"
        peer_gateway: "207.236.214.34"
        remote_subnets: ["192.168.102.0/24"]
        enabled: true

      - name_on_hub: "STL-KING-100 IPsec"
        peer_gateway: "69.7.247.201"
        remote_subnets: ["192.168.105.0/24"]
        enabled: true

      - name_on_hub: "STL-WIND-100 IPsec"
        peer_gateway: "192.186.113.50"
        remote_subnets: ["192.168.106.0/24"]
        enabled: true

    # Crypto profile observed from policy screens (hub side)
    crypto_profile_observed:
      auth_method: "IKE Using Preshared Secret"
      psk_secret_ref: "1password://<vault>/<item>/BELL-102-IPsec-PSK"
      ike_phase1:
        exchange_mode: "Aggressive Mode"
        encryption: "AES-256"
        authentication: "SHA256"
        dh_group: "256-Bit Random ECP Group"
        lifetime_seconds: 28800
      ipsec_phase2:
        protocol: "ESP"
        encryption: "AES-256"
        authentication: "SHA256"
        pfs_enabled: true
        dh_group: "256-Bit Random ECP Group"
        lifetime_seconds: 28800

    policy_advanced_defaults_observed:
      vpn_policy_bound_to: "Zone WAN"
      keep_alive_enabled: true
      apply_nat_policies: false
      notes:
        - "Advanced options vary per-policy; confirm per tunnel if standardization is needed."

verification:
  quick_checks:
    - name: "Confirm Bell WAN X3 interface configuration"
      method: "UI"
      expected: "X3 shows 207.236.163.98/27, gateway 207.236.163.97, DNS set, link 1 Gbps Full Duplex"
    - name: "Confirm Cogeco remains production primary"
      method: "Routing UI"
      expected: "Default route remains via X1"
    - name: "Confirm STL tunnels active"
      method: "Network > IPsec VPN > Active Tunnels"
      expected: "STL-* tunnels show established"
  last_verified_utc: ""
  evidence_refs: []
  