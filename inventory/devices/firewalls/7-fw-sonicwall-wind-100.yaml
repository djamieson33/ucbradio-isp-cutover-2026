# inventory/devices/7-wind-100.yaml
# Windsor transmitter site firewall

device:
  name: "WIND-100"
  site: "Windsor"
  asset_number: 7
  vendor: "SonicWall"
  model: "TZ270"
  role: "Transmitter site firewall"
  unique_firewall_identifier: "2CB8EDD825E0"
  serial_number: "2CB8EDD825E0"

management:
  wan_url: "https://192.186.113.50"
  lan_url: "https://192.168.1.1"
  username: "admin"
  notes:
    - "LAN management IP from asset card: 192.168.1.1"
    - "Hub tunnel list indicates remote network: 192.168.106.0/24"
    - "Verify whether 192.168.1.1 is a management VLAN vs the actual LAN gateway for 192.168.106.0/24"

interfaces:
  wan:
    public_ip: "192.186.113.50"
    role: "Primary WAN"
  lan:
    tunnel_remote_subnet_expected: "192.168.106.0/24"
    mgmt_ip_observed: "192.168.1.1"
    gateway_ip: "unknown"
    subnet: "unknown"
    notes:
      - "Confirm actual LAN gateway/subnet from the firewall interface list."

vpn:
  ipsec_site_to_site:
    - name: "STL-WIND-100 IPsec"
      status: "active_on_hub"
      local_subnet: "192.168.106.0/24"
      remote_subnet: "192.168.100.0/24"
      remote_gateway_expected: "unknown"  # likely 24.51.249.34; confirm on site firewall
      crypto_suite: "ESP: AES-256/HMAC SHA256 (IKE)"
      nat_traversal: "unknown"
      dpd:
        enabled: "unknown"
        interval_seconds: "unknown"
        failure_trigger_level: "unknown"
      notes:
        - "Must pre-whitelist hub Bell IP 207.236.163.98 prior to cutover"
        - "Recommend dual-whitelisting hub Cogeco IP 24.51.249.34 temporarily where possible"

tags:
  - wind-100
  - windsor
  - transmitter-site
  - sonicwall
  - tz270
  